task:
  name: "Circle Packing TTT"
  description: |
    Pack N = 26 circles into a unit square (side length 1) to maximize the sum of radii.

    Find positions (x_i, y_i) and radii r_i for i = 1..N such that:
      1. x_i - r_i >= 0 and x_i + r_i <= 1
      2. y_i - r_i >= 0 and y_i + r_i <= 1
      3. sqrt((x_i - x_j)^2 + (y_i - y_j)^2) >= r_i + r_j for all i != j
      4. sum(r_i) is maximized

    Your program file `initial_program.py` must define a `run()` function that returns
    (centers, radii, sum_radii) where:
      - centers: numpy array of shape (26, 2) with (x, y) coordinates
      - radii: numpy array of shape (26,) with radius of each circle
      - sum_radii: float, sum of all radii

    Score = your_sum_radii / 2.635977; goal is to reach or surpass 1.
  tips: |
    - Eval timeout is 600s.
    - numpy and scipy are always available.
    - Best known sum of radii for N=26 is 2.635977.

grader:
  timeout: 600
  direction: maximize
  args:
    program_file: "initial_program.py"

agents:
  count: 1
  runtime: opencode
  model: vllm/Qwen/Qwen3-8B
  gateway:
    enabled: true
    port: 4000
    config: "./litellm_vllm.yaml"

workspace:
  results_dir: "./results"
  repo_path: "./examples/circle_packing/seed"
  setup:
    - "pip install numpy scipy --quiet 2>/dev/null || true"

run:
  verbose: true
  ui: false
  session: local
